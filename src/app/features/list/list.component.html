<div class="p-6 flex flex-col items-center mt-10 max-w-7xl mx-auto">
  <h1 class="text-5xl font-extrabold mb-6 text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500">
    Lista de Países
  </h1>

  <!-- Spinner de carga -->
  <div *ngIf="loading" class="flex flex-col items-center mt-10 text-gray-500 animate-pulse space-y-4">
    <div class="relative">
      <svg class="w-16 h-16 text-indigo-500 animate-spin" viewBox="0 0 24 24">
        <circle class="opacity-20" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/>
        <path class="opacity-80" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/>
      </svg>
    </div>
    <p class="mt-2 text-lg font-medium">Cargando países...</p>
  </div>

  <!-- Grid para banderas -->
  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 mt-6 w-full px-2" *ngIf="!loading">
    <div
      *ngFor="let country of countries"
      (click)="goToDetail(country.cca3)"
      class="group relative bg-gray-400 dark:bg-gray-500 border border-white/20 hover:border-indigo-400 transition-all duration-300 shadow-xl rounded-xl overflow-hidden cursor-pointer hover:scale-[1.03]"
    >
      <!-- Contenedor de bandera -->
      <div class="relative pt-[66.666%]">
        <img
          [src]="country.flags?.svg"
          alt="{{ country.name.common }}"
          class="absolute top-0 left-0 w-full h-full object-cover group-hover:brightness-110 transition duration-300"
          loading="lazy"
          onerror="this.onerror=null;this.src='assets/default-flag.svg';this.alt='Bandera no disponible'"
        />
      </div>
      
      <!-- Contenido de la tarjeta -->
      <div class="p-4 text-center space-y-2">
        <p class="text-lg font-semibold text-gray-800 dark:text-white truncate">
          {{ country.name.common }}
        </p>
        <div class="flex items-center justify-center space-x-2">
          <span class="text-xs px-2 py-1 bg-indigo-100 dark:bg-indigo-900 text-indigo-600 dark:text-indigo-200 rounded-full">
            {{ country.region }}
          </span>
          <span class="text-xs px-2 py-1 bg-purple-100 dark:bg-purple-900 text-purple-600 dark:text-purple-200 rounded-full">
            {{ country.capital?.[0] || 'Sin capital' }}
          </span>
        </div>
      </div>
      
      <!-- Efecto hover overlay -->
      <div class="absolute inset-0 bg-gradient-to-t from-black/30 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
    </div>
  </div>
</div>
