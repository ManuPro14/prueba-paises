<div class="p-4 flex flex-col items-center mt-8">
  <h1 class="text-4xl font-bold mb-4">Lista de países</h1>

  <div *ngIf="loading" class="text-center text-gray-500">Cargando...</div>

  <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4" *ngIf="!loading">
    <div
      *ngFor="let country of countries"
      class="bg-white p-4 shadow rounded cursor-pointer hover:bg-gray-100 transition"
      (click)="goToDetail(country.cca3)"
    >
      <img [src]="country.flags.svg" alt="{{ country.name.common }}" class="h-20 w-full object-cover rounded mb-2" />
      <p class="text-center font-medium">{{ country.name.common }}</p>
    </div>
  </div>
</div>
