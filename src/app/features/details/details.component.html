<div class="p-4" *ngIf="!loading && country">
  <h2 class="text-2xl font-bold mb-4">{{ country.name.common }}</h2>
  <img [src]="country.flags.svg" alt="Bandera" class="w-64 mb-4" />

  <p><strong>Capital:</strong> {{ country.capital?.[0] }}</p>
  <p><strong>Región:</strong> {{ country.region }}</p>
  <p><strong>Subregión:</strong> {{ country.subregion }}</p>
  <p><strong>Población:</strong> {{ country.population | number }}</p>
  <p><strong>Área:</strong> {{ country.area | number }} km²</p>
</div>

<div *ngIf="loading" class="text-center text-gray-500">
  Cargando detalles...
</div>
